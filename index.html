<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Travel Planner</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container py-4">
      <header class="text-center mb-4">
        <h1 class="mb-0">Travel Planner</h1>
      </header>

      <!-- Nav (pills) -->
      <ul class="nav nav-pills mb-3" id="main-tabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            id="tab-add-tab"
            data-bs-toggle="tab"
            data-bs-target="#tab-add"
            type="button"
            role="tab"
          >
            Agregar Ciudad
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            id="tab-list-tab"
            data-bs-toggle="tab"
            data-bs-target="#tab-list"
            type="button"
            role="tab"
          >
            Destinos
          </button>
        </li>
      </ul>

      <!-- Formulario de agregar ciudad -->
      <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-add" role="tabpanel">
          <div class="row">
            <div class="col-12 mb-4">
              <form id="city-form" class="row g-3">
                <div class="col-md-6">
                  <label for="city-name" class="form-label">Ciudad</label>
                  <input id="city-name" class="form-control" required />
                </div>
                <div class="col-md-6">
                  <label for="city-country" class="form-label">País</label>
                  <input id="city-country" class="form-control" />
                </div>
                <div class="col-md-3">
                  <label for="city-date-from" class="form-label"
                    >Fecha ida</label
                  >
                  <input
                    id="city-date-from"
                    class="form-control"
                    type="date"
                    required
                  />
                </div>
                <div class="col-md-3">
                  <label for="city-date-to" class="form-label"
                    >Fecha vuelta</label
                  >
                  <input
                    id="city-date-to"
                    class="form-control"
                    type="date"
                    required
                  />
                </div>
                <div class="col-6">
                  <label for="city-notes" class="form-label">
                    Notas (actividades, detalles)
                  </label>
                  <textarea
                    id="city-notes"
                    class="form-control"
                    placeholder="Actividades a hacer, detalles extra"
                  ></textarea>
                </div>
                <div class="col-12">
                  <button type="submit" class="btn btn-primary">
                    Agregar Ciudad
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- Tabla de destinos -->
        <div class="tab-pane fade" id="tab-list" role="tabpanel">
          <div class="row">
            <div class="col-12">
              <table class="table table-sm" id="cities-table">
                <thead>
                  <tr>
                    <th>Nombre</th>
                    <th>País</th>
                    <th>Duración</th>
                    <th>Fecha ida</th>
                    <th>Fecha vuelta</th>
                    <th>Notas</th>
                  </tr>
                </thead>
                <tbody id="cities-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
      <script type="module" src="main.js"></script>
    </div>
  </body>
</html>
